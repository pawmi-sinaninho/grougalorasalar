services:
  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    environment:
      GS_ENV: development
      GS_FIXTURE_MODE: ${GS_FIXTURE_MODE:-0}
      GS_SESSION_ROOT: /runtime/sessions
      GS_ALLOWED_ORIGINS: http://localhost:3000
    volumes:
      - gs_sessions:/runtime/sessions
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health/ready')"]
      interval: 10s
      timeout: 3s
      retries: 10

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE: http://localhost:8000/api/v1
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:8000/api/v1
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 10

volumes:
  gs_sessions:
